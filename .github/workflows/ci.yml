name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test tvOS app
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: List project schemes
        run: xcodebuild -list -project "MoviePilot-TV.xcodeproj"

      - name: List available tvOS simulators
        run: xcrun simctl list devices tvOS available

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "MoviePilot-TV.xcodeproj" \
            -scheme "MoviePilot-TV" \
            -skipPackagePluginValidation

      - name: Build
        run: |
          xcodebuild clean build \
            -project "MoviePilot-TV.xcodeproj" \
            -scheme "MoviePilot-TV" \
            -configuration Debug \
            -destination "generic/platform=tvOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -skipPackagePluginValidation

      - name: Test
        run: |
          xcodebuild test \
            -project "MoviePilot-TV.xcodeproj" \
            -scheme "MoviePilot-TV" \
            -configuration Debug \
            -destination "platform=tvOS Simulator,name=Apple TV" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -skipPackagePluginValidation
